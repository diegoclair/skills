name: Release social-carousel

on:
  push:
    tags:
      - 'carousel-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: social-carousel/cli/go.mod
          cache: true
          cache-dependency-path: social-carousel/cli/go.sum

      # Fonts are embedded via go:embed at compile time, so they must be
      # present on disk BEFORE the cross-compile step. `make fonts` is
      # idempotent and skips if assets exist. ~12 MB / ~5 s on cold cache.
      - name: Download fonts (Outfit, DM Sans, Playfair, Space Grotesk, Inter, Noto Color Emoji)
        working-directory: social-carousel
        run: make fonts

      - name: Run tests
        working-directory: social-carousel
        run: make test

      - name: Compute clean version (strip "carousel-" prefix)
        id: ver
        run: |
          set -euo pipefail
          # Tag is e.g. "carousel-v0.1.0". The binary should report "v0.1.0".
          TAG="${{ github.ref_name }}"
          CLEAN="${TAG#carousel-}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "clean=$CLEAN" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG -> clean version $CLEAN"

      - name: Cross-compile binaries (5 platforms, fonts embedded)
        working-directory: social-carousel
        run: make build-all VERSION=${{ steps.ver.outputs.clean }}

      - name: Package platform ZIPs
        run: |
          set -euo pipefail
          mkdir -p release-assets

          # platform : source binary name in dist/ : destination name in ZIP
          entries=(
            "darwin-amd64:social-carousel-darwin-amd64:social-carousel"
            "darwin-arm64:social-carousel-darwin-arm64:social-carousel"
            "linux-amd64:social-carousel-linux-amd64:social-carousel"
            "linux-arm64:social-carousel-linux-arm64:social-carousel"
            "windows-amd64:social-carousel-windows-amd64.exe:social-carousel.exe"
          )

          for entry in "${entries[@]}"; do
            IFS=':' read -r platform src_bin dst_bin <<< "$entry"
            stage="$(mktemp -d)"

            cp social-carousel/SKILL.md "$stage/SKILL.md"
            cp -r social-carousel/reference "$stage/reference"

            mkdir -p "$stage/bin"
            cp "social-carousel/cli/dist/$src_bin" "$stage/bin/$dst_bin"
            chmod +x "$stage/bin/$dst_bin"

            (cd "$stage" && zip -r "$GITHUB_WORKSPACE/release-assets/social-carousel-$platform.zip" . -q)
            rm -rf "$stage"
          done

          echo "--- release assets ---"
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.ver.outputs.tag }}
          files: release-assets/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Do NOT make this the "latest" release of the repo — confluence-docs
          # holds that slot. The installer resolves the latest carousel-v*
          # release via the GitHub API with prefix filtering.
          make_latest: false
