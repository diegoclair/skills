name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: confluence-docs/cli/go.mod
          cache: true
          cache-dependency-path: confluence-docs/cli/go.sum

      - name: Run tests
        working-directory: confluence-docs/cli
        run: make test

      - name: Cross-compile binaries
        working-directory: confluence-docs/cli
        run: make build-all VERSION=${{ github.ref_name }}

      - name: Package platform ZIPs
        run: |
          set -euo pipefail
          mkdir -p release-assets

          # platform : source binary name in dist/ : destination name in ZIP
          entries=(
            "darwin-amd64:confluence-docs-darwin-amd64:confluence-docs"
            "darwin-arm64:confluence-docs-darwin-arm64:confluence-docs"
            "linux-amd64:confluence-docs-linux-amd64:confluence-docs"
            "linux-arm64:confluence-docs-linux-arm64:confluence-docs"
            "windows-amd64:confluence-docs-windows-amd64.exe:confluence-docs.exe"
          )

          for entry in "${entries[@]}"; do
            IFS=':' read -r platform src_bin dst_bin <<< "$entry"
            stage="$(mktemp -d)"

            cp confluence-docs/SKILL.md "$stage/SKILL.md"
            cp -r confluence-docs/reference "$stage/reference"

            mkdir -p "$stage/bin"
            cp "confluence-docs/cli/dist/$src_bin" "$stage/bin/$dst_bin"
            chmod +x "$stage/bin/$dst_bin"

            (cd "$stage" && zip -r "$GITHUB_WORKSPACE/release-assets/confluence-docs-$platform.zip" . -q)
            rm -rf "$stage"
          done

          echo "--- release assets ---"
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release-assets/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
