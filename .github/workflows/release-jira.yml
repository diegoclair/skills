name: Release jira-tickets

on:
  push:
    tags:
      - 'jira-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: jira-tickets/cli/go.mod
          cache: true
          cache-dependency-path: jira-tickets/cli/go.sum

      - name: Run tests
        working-directory: jira-tickets/cli
        run: make test

      - name: Compute clean version (strip "jira-" prefix)
        id: ver
        run: |
          set -euo pipefail
          # Tag is e.g. "jira-v0.1.0". The binary should report "v0.1.0".
          TAG="${{ github.ref_name }}"
          CLEAN="${TAG#jira-}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "clean=$CLEAN" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG -> clean version $CLEAN"

      - name: Cross-compile binaries
        working-directory: jira-tickets/cli
        run: make build-all VERSION=${{ steps.ver.outputs.clean }}

      - name: Package platform ZIPs
        run: |
          set -euo pipefail
          mkdir -p release-assets

          # platform : source binary name in dist/ : destination name in ZIP
          entries=(
            "darwin-amd64:jira-tickets-darwin-amd64:jira-tickets"
            "darwin-arm64:jira-tickets-darwin-arm64:jira-tickets"
            "linux-amd64:jira-tickets-linux-amd64:jira-tickets"
            "linux-arm64:jira-tickets-linux-arm64:jira-tickets"
            "windows-amd64:jira-tickets-windows-amd64.exe:jira-tickets.exe"
          )

          for entry in "${entries[@]}"; do
            IFS=':' read -r platform src_bin dst_bin <<< "$entry"
            stage="$(mktemp -d)"

            cp jira-tickets/SKILL.md "$stage/SKILL.md"
            cp -r jira-tickets/reference "$stage/reference"

            mkdir -p "$stage/bin"
            cp "jira-tickets/cli/dist/$src_bin" "$stage/bin/$dst_bin"
            chmod +x "$stage/bin/$dst_bin"

            (cd "$stage" && zip -r "$GITHUB_WORKSPACE/release-assets/jira-tickets-$platform.zip" . -q)
            rm -rf "$stage"
          done

          echo "--- release assets ---"
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.ver.outputs.tag }}
          files: release-assets/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: false
